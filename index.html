<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Inventory</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar-row">
        <button id="btn-parent" type="button" title="Go to parent location">
          ↑ Parent
        </button>
        <h1 id="location-title">Home Inventory</h1>
      </div>
      <div class="toolbar-row search-row">
        <input
          id="search-input"
          type="search"
          placeholder="Search items…"
          autocomplete="off"
        />
        <label class="scope-label" for="search-scope">Search in</label>
        <select id="search-scope">
          <option value="location">This location</option>
          <option value="all">All locations</option>
        </select>
        <button id="btn-clear-search" type="button" hidden>Clear</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </header>
    <main>
      <div id="grid"></div>
    </main>
    <script src="/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@33.3.0/dist/ag-grid-community.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
